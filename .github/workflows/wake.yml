name: Streamlit Keep-Awake Engine

on:
  schedule:
    - cron: "0 */4 * * *" # Runs perfectly every 4 hours, 365 days a year
  workflow_dispatch: # Allows you to manually trigger it from the UI anytime

jobs:
  wake-app:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Waker Script
        env:
          STREAMLIT_APP_URL: "https://agsroofmappingtool.streamlit.app/"
        run: python wake.py
